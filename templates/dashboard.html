<!DOCTYPE html>
<html>
<head>
    <title>AI DevOps Agent Dashboard</title>

    <meta http-equiv="refresh" content="5">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .alert {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🚀 AI DevOps Agent Dashboard</h1>

<div class="card">
    <h2>CPU Usage</h2>
    <p>{{ cpu }}%</p>
</div>

<div class="card">
    <h2>Memory Usage</h2>
    <p>{{ memory }}%</p>
</div>

<div class="card">
    <h2>Disk Usage</h2>
    <p>{{ disk }}%</p>
</div>

{% if cpu > 80 %}
<div class="card alert">
    ⚠ High CPU Usage Detected!
</div>
{% endif %}

{% if memory > 80 %}
<div class="card alert">
    ⚠ High Memory Usage Detected!
</div>
{% endif %}

{% if disk > 80 %}
<div class="card alert">
    ⚠ Disk Usage Critical!
</div>
{% endif %}

</body>
</html>
